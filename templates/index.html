<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tender Hunter AI</title>
</head>
<body style="font-family:Arial;background:#f5f5f5;text-align:center;padding:40px;">

<h1>🚀 Tender Hunter AI</h1>
<p>Find Government Tenders & Winners</p>

<form method="POST">
<input type="text" name="keyword" placeholder="Search company or keyword" value="{{ keyword }}" style="width:300px;padding:10px;">
  <button type="submit">🔍 Search</button>
</form>
{% if keyword %}
<hr>
<h3>Search Result</h3>
<p>You searched for: <b>{{ keyword }}</b></p>
{% endif %}
<br><br>

<div style="background:white;padding:20px;border-radius:10px;display:inline-block;">
  <h3>Features</h3>
  <p>🔎 CPPP Tender Search</p>
  <p>🏆 Tender Winners</p>
  <p>📈 Listed Company Alerts</p>
  <p>🤖 AI Tender Analysis</p>
</div>

</body>
</html>
